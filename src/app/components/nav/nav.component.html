<mat-sidenav-container>
  
  <mat-sidenav #sidenav mode="over" class="mobile-sidenav">
    <nav class="mobile-links">
      <a href="#sobremim" (click)="sidenav.close()">Sobre</a>
      <a href="#projetos" (click)="sidenav.close()">Projetos</a>
      <a href="#Conhecimentos" (click)="sidenav.close()">Conhecimentos</a>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content>
    
    <mat-toolbar class="custom-toolbar">
      <div class="logo-container">
        <span class="logo">Luis Henrique</span>
        <span class="role">Full Stack Developer</span>
      </div>

      <span class="spacer"></span>

      <nav class="desktop-links">
        <a href="#sobremim">Sobre</a>
        <a href="#projetos">Projetos</a>
        <a href="#Conhecimentos">Conhecimentos</a>
        <a href="#contato" class="contact-btn">Contato</a>
      </nav>

      <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar>

    <router-outlet></router-outlet>

  </mat-sidenav-content>
</mat-sidenav-container>
